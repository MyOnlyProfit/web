.book{max-width:1000px;margin:0 auto;padding:40px 40px 80px}

.page{background:var(--dark2);border:1px solid var(--dark3);border-radius:8px;padding:48px 56px;position:relative;overflow:hidden}

.toc-item{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.toc-item a{color:var(--cyan);text-decoration:none;transition:color .2s}
.toc-item a:hover{color:var(--pink)}
.toc-item span{color:var(--text-dim);font-size:.75rem;font-family:'Space Mono',monospace}

.page-footer{margin-top:36px;padding-top:16px;border-top:1px solid var(--dark3);display:flex;justify-content:space-between;align-items:center;font-size:.68rem;color:var(--text-dim);font-family:'Space Mono',monospace;flex-wrap:wrap;gap:8px}
.page-num{background:var(--pink);color:var(--dark);padding:2px 10px;border-radius:3px;font-weight:700;font-size:.7rem;white-space:nowrap}
